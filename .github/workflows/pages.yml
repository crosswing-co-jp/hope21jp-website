name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Rewrite paths for GitHub Pages subdirectory
        shell: bash
        run: |
          python3 << 'PYEOF'
          import os, re

          BASE = "/hope21jp-website"
          BASE_ESC = re.escape(BASE.lstrip("/"))

          def rewrite_html_part(part):
              """Rewrite non-script HTML content"""
              # 相対パス ../../wp-content/ → /base/wp-content/
              part = re.sub(r'(\.\./)+wp-content/', BASE + '/wp-content/', part)
              part = re.sub(r'(\.\./)+wp-includes/', BASE + '/wp-includes/', part)

              # href="wp-content/..." (ベースパスなし直接参照)
              part = re.sub(r'(href|src)="wp-content/', r'\1="' + BASE + '/wp-content/', part)
              part = re.sub(r'(href|src)="wp-includes/', r'\1="' + BASE + '/wp-includes/', part)

              # href="/foo/" ルート絶対パス → /base/foo/
              part = re.sub(
                  r'(href|src|action)="/(?!' + BASE_ESC + r'/)',
                  r'\1="' + BASE + '/',
                  part
              )
              part = re.sub(
                  r"location\.href='/(?!" + BASE_ESC + r"/)",
                  "location.href='" + BASE + "/",
                  part
              )
              return part

          def rewrite_script_part(part):
              """Rewrite script content (importmap, JS vars)"""
              # エスケープ版 \/wp-includes\/ → \/base\/wp-includes\/
              base_esc_slash = BASE.replace("/", "\\/")
              part = part.replace("\\/wp-includes\\/", base_esc_slash + "\\/wp-includes\\/")
              part = part.replace("\\/wp-content\\/", base_esc_slash + "\\/wp-content\\/")

              # 非エスケープ版
              part = re.sub(r'"/wp-includes/', '"' + BASE + '/wp-includes/', part)
              part = re.sub(r'"/wp-content/', '"' + BASE + '/wp-content/', part)

              return part

          count = 0
          for root, dirs, files in os.walk("."):
              dirs[:] = [d for d in dirs if not d.startswith(".")]
              for f in files:
                  if not f.endswith(".html"):
                      continue
                  path = os.path.join(root, f)
                  with open(path, "r", encoding="utf-8", errors="ignore") as fh:
                      content = fh.read()
                  original = content

                  parts = re.split(r'(<script[^>]*>.*?</script>)', content, flags=re.DOTALL)
                  new_parts = []
                  for part in parts:
                      if re.match(r'<script', part):
                          # JSON-LDはそのまま、それ以外のscriptはパス変換
                          if 'application/ld+json' in part:
                              new_parts.append(part)
                          else:
                              new_parts.append(rewrite_script_part(part))
                      else:
                          new_parts.append(rewrite_html_part(part))
                  content = "".join(new_parts)

                  if content != original:
                      with open(path, "w", encoding="utf-8") as fh:
                          fh.write(content)
                      count += 1

          print(f"HTML: rewrote {count} files")

          # CSS
          css_count = 0
          for root, dirs, files in os.walk("."):
              dirs[:] = [d for d in dirs if not d.startswith(".")]
              for f in files:
                  if not f.endswith(".css"):
                      continue
                  path = os.path.join(root, f)
                  with open(path, "r", encoding="utf-8", errors="ignore") as fh:
                      content = fh.read()
                  original = content
                  content = content.replace("url(/wp-content/", f"url({BASE}/wp-content/")
                  content = content.replace("url(/wp-includes/", f"url({BASE}/wp-includes/")
                  if content != original:
                      with open(path, "w", encoding="utf-8") as fh:
                          fh.write(content)
                      css_count += 1

          print(f"CSS: rewrote {css_count} files")
          PYEOF

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
