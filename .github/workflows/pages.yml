name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Rewrite paths for GitHub Pages subdirectory
        shell: bash
        run: |
          BASE="/hope21jp-website"

          echo "=== Rewriting HTML paths ==="

          # HTML: 相対パス ../../wp-content/ 等 → 絶対パス
          find . -name "*.html" -print0 | xargs -0 sed -i -E \
            -e "s|(\.\./)+(wp-content/)|${BASE}/\2|g" \
            -e "s|(\.\./)+(wp-includes/)|${BASE}/\2|g"

          # HTML: ルート直接参照 href="wp-content/..." → ベースパス付き
          find . -name "*.html" -print0 | xargs -0 sed -i \
            -e 's|href="wp-content/|href="'"${BASE}"'/wp-content/|g' \
            -e 's|src="wp-content/|src="'"${BASE}"'/wp-content/|g' \
            -e 's|href="wp-includes/|href="'"${BASE}"'/wp-includes/|g' \
            -e 's|src="wp-includes/|src="'"${BASE}"'/wp-includes/|g'

          # HTML: ルート絶対パス href="/foo/" → href="/base/foo/"
          # JSON-LD内のURLは除外するため、scriptタグ外のみ対象
          python3 << 'PYEOF'
          import os, re
          base = "/hope21jp-website"
          for root, dirs, files in os.walk("."):
              dirs[:] = [d for d in dirs if not d.startswith(".")]
              for f in files:
                  if not f.endswith(".html"):
                      continue
                  path = os.path.join(root, f)
                  with open(path, "r") as fh:
                      content = fh.read()
                  parts = re.split(r'(<script[^>]*>.*?</script>)', content, flags=re.DOTALL)
                  new_parts = []
                  for part in parts:
                      if part.startswith("<script"):
                          new_parts.append(part)
                      else:
                          part = re.sub(r'(href|src|action)="/(?!/' + base.lstrip("/") + r')', r'\1="' + base + r'/', part)
                          part = re.sub(r"location\.href='/(?!/" + base.lstrip("/") + r"')", "location.href='" + base + "/", part)
                          new_parts.append(part)
                  with open(path, "w") as fh:
                      fh.write("".join(new_parts))
          PYEOF

          echo "=== Rewriting CSS paths ==="

          # CSS: url(/wp-content/...) → url(/base/wp-content/...)
          find . -name "*.css" -print0 | xargs -0 sed -i \
            -e "s|url(/wp-content/|url(${BASE}/wp-content/|g" \
            -e "s|url(/wp-includes/|url(${BASE}/wp-includes/|g"

          echo "=== Done ==="

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
