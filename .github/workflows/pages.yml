name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Rewrite paths for GitHub Pages subdirectory
        shell: bash
        run: |
          BASE="/hope21jp-website"

          echo "=== Rewriting HTML paths ==="

          # HTML: 本番絶対URL → ベースパス付き相対パス
          find . -name "*.html" -print0 | xargs -0 sed -i \
            -e "s|https://hope21\.jp/wp-content/|${BASE}/wp-content/|g" \
            -e "s|https://hope21\.jp/wp-includes/|${BASE}/wp-includes/|g"

          # HTML: 相対パス ../../wp-content/ 等 → 絶対パス
          find . -name "*.html" -print0 | xargs -0 sed -i -E \
            -e "s|(\.\./)+(wp-content/)|${BASE}/\2|g" \
            -e "s|(\.\./)+(wp-includes/)|${BASE}/\2|g"

          # HTML: ルート直接参照 href="wp-content/..." → ベースパス付き
          find . -name "*.html" -print0 | xargs -0 sed -i \
            -e 's|href="wp-content/|href="'"${BASE}"'/wp-content/|g' \
            -e 's|src="wp-content/|src="'"${BASE}"'/wp-content/|g' \
            -e 's|href="wp-includes/|href="'"${BASE}"'/wp-includes/|g' \
            -e 's|src="wp-includes/|src="'"${BASE}"'/wp-includes/|g'

          echo "=== Rewriting CSS paths ==="

          # CSS: url(/wp-content/...) → url(/base/wp-content/...)
          find . -name "*.css" -print0 | xargs -0 sed -i \
            -e "s|url(/wp-content/|url(${BASE}/wp-content/|g" \
            -e "s|url(/wp-includes/|url(${BASE}/wp-includes/|g"

          echo "=== Done ==="

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
