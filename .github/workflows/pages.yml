name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Rewrite paths for GitHub Pages subdirectory
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          BASE="/${REPO_NAME}"

          # HTML: 相対パスの ../../../wp-content, ../wp-includes 等を絶対パスに変換
          find . -name "*.html" -exec sed -i -E \
            -e "s|(href\|src\|content)=\"(\.\./)+wp-content/|\1=\"${BASE}/wp-content/|g" \
            -e "s|(href\|src\|content)=\"(\.\./)+wp-includes/|\1=\"${BASE}/wp-includes/|g" \
            -e "s|(href\|src\|content)=\"(\.\./)+wp-json/|\1=\"${BASE}/wp-json/|g" \
            {} +

          # HTML: ルート相対パス（/なし）にベースパスを付与
          find . -name "*.html" -exec sed -i -E \
            -e "s|(href\|src)=\"wp-content/|\1=\"${BASE}/wp-content/|g" \
            -e "s|(href\|src)=\"wp-includes/|\1=\"${BASE}/wp-includes/|g" \
            {} +

          # CSS: 絶対パス url(/wp-content/...) にベースパスを付与
          find . -name "*.css" -exec sed -i -E \
            -e "s|url\(/wp-content/|url(${BASE}/wp-content/|g" \
            -e "s|url\(/wp-includes/|url(${BASE}/wp-includes/|g" \
            {} +

          # CSS: 相対パス url(../wp-content/...) を絶対パスに変換
          find . -name "*.css" -exec sed -i -E \
            -e "s|url\((\.\./)+wp-content/|url(${BASE}/wp-content/|g" \
            -e "s|url\((\.\./)+wp-includes/|url(${BASE}/wp-includes/|g" \
            {} +

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
